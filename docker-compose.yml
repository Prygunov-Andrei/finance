services:

  # =========================================================================
  # ИНФРАСТРУКТУРА
  # =========================================================================

  postgres:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-finans_assistant}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/worklog-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/worklog-media;
      /usr/bin/mc mb myminio/files --ignore-existing;
      /usr/bin/mc mb myminio/product-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/product-media;
      /usr/bin/mc mb myminio/portal-estimates --ignore-existing;
      /usr/bin/mc mb myminio/hvac-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/hvac-media;
      exit 0;
      "

  createkanbandb:
    image: postgres:14-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: postgres
      KANBAN_DB_NAME: ${KANBAN_DB_NAME:-kanban}
    entrypoint: >
      /bin/sh -c "
      echo 'Ensuring kanban database exists...';
      psql -h $$DB_HOST -U $$DB_USER -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname='$$KANBAN_DB_NAME'\" | grep -q 1
      || psql -h $$DB_HOST -U $$DB_USER -d postgres -c \"CREATE DATABASE \\\"$$KANBAN_DB_NAME\\\"\" ;
      exit 0;
      "

  # =========================================================================
  # BACKEND (Django + Gunicorn)
  # =========================================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["gunicorn", "finans_assistant.wsgi:application",
              "--bind", "0.0.0.0:8000", "--workers", "2", "--timeout", "120",
              "--reload",
              "--access-logfile", "-", "--error-logfile", "-"]
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev-key-change-in-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-finans_assistant}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WORKLOG_S3_ENDPOINT_URL=http://minio:9000
      - WORKLOG_S3_PUBLIC_URL=http://localhost:9000
      - WORKLOG_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - WORKLOG_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - WORKLOG_S3_BUCKET_NAME=worklog-media
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - ERP_SERVICE_TOKEN=${ERP_SERVICE_TOKEN:-}
      - PRODUCTION_DOMAIN=${PRODUCTION_DOMAIN:-}
      - PRODUCTION_IP=${PRODUCTION_IP:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - BANK_ENCRYPTION_KEY=${BANK_ENCRYPTION_KEY:-}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
      - JWT_ISSUER=${JWT_ISSUER:-finans-assistant-erp}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-kanban-service}
      - BREEZ_API_BASE_URL=${BREEZ_API_BASE_URL:-https://api.breez.ru/v1}
      - BREEZ_API_AUTH_HEADER=${BREEZ_API_AUTH_HEADER:-}
      - FNS_API_KEY=${FNS_API_KEY:-}
      # Portal S3 storage
      - PORTAL_S3_ENDPOINT_URL=http://minio:9000
      - PORTAL_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - PORTAL_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PORTAL_S3_BUCKET_NAME=portal-estimates
      - PORTAL_DOMAIN=${PORTAL_DOMAIN:-}
      # Email (SMTP)
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@example.com}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_logs:/app/logs
      - backend_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kanban-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["gunicorn", "kanban_service.wsgi:application", "--bind", "0.0.0.0:8010", "--workers", "2", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    ports:
      - "8010:8010"
    environment:
      - KANBAN_DEBUG=${KANBAN_DEBUG:-True}
      - KANBAN_SECRET_KEY=${KANBAN_SECRET_KEY:-django-insecure-kanban-dev-key}
      - KANBAN_DB_HOST=postgres
      - KANBAN_DB_PORT=5432
      - KANBAN_DB_NAME=${KANBAN_DB_NAME:-kanban}
      - KANBAN_DB_USER=${DB_USER:-postgres}
      - KANBAN_DB_PASSWORD=${DB_PASSWORD:-postgres}
      - KANBAN_CELERY_BROKER_URL=redis://redis:6379/1
      - KANBAN_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - KANBAN_S3_ENDPOINT_URL=http://minio:9000
      - KANBAN_S3_PUBLIC_URL=${KANBAN_S3_PUBLIC_URL:-http://localhost:3000}
      - KANBAN_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - KANBAN_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - KANBAN_S3_BUCKET_NAME=files
      - ERP_API_BASE_URL=http://backend:8000/api/v1
      - ERP_SERVICE_TOKEN=${ERP_SERVICE_TOKEN:-}
      - ERP_JWT_SECRET=${SECRET_KEY}
    depends_on:
      createkanbandb:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  kanban-celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A kanban_service worker --loglevel=info --concurrency=2
    environment:
      - KANBAN_DEBUG=${KANBAN_DEBUG:-True}
      - KANBAN_SECRET_KEY=${KANBAN_SECRET_KEY:-django-insecure-kanban-dev-key}
      - KANBAN_DB_HOST=postgres
      - KANBAN_DB_PORT=5432
      - KANBAN_DB_NAME=${KANBAN_DB_NAME:-kanban}
      - KANBAN_DB_USER=${DB_USER:-postgres}
      - KANBAN_DB_PASSWORD=${DB_PASSWORD:-postgres}
      - KANBAN_CELERY_BROKER_URL=redis://redis:6379/1
      - KANBAN_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - KANBAN_S3_ENDPOINT_URL=http://minio:9000
      - KANBAN_S3_PUBLIC_URL=${KANBAN_S3_PUBLIC_URL:-http://localhost:3000}
      - KANBAN_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - KANBAN_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - KANBAN_S3_BUCKET_NAME=files
      - ERP_API_BASE_URL=http://backend:8000/api/v1
      - ERP_SERVICE_TOKEN=${ERP_SERVICE_TOKEN:-}
    depends_on:
      createkanbandb:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  kanban-celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A kanban_service beat --loglevel=info
    environment:
      - KANBAN_DEBUG=${KANBAN_DEBUG:-True}
      - KANBAN_SECRET_KEY=${KANBAN_SECRET_KEY:-django-insecure-kanban-dev-key}
      - KANBAN_DB_HOST=postgres
      - KANBAN_DB_PORT=5432
      - KANBAN_DB_NAME=${KANBAN_DB_NAME:-kanban}
      - KANBAN_DB_USER=${DB_USER:-postgres}
      - KANBAN_DB_PASSWORD=${DB_PASSWORD:-postgres}
      - KANBAN_CELERY_BROKER_URL=redis://redis:6379/1
      - KANBAN_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - KANBAN_S3_ENDPOINT_URL=http://minio:9000
      - KANBAN_S3_PUBLIC_URL=${KANBAN_S3_PUBLIC_URL:-http://localhost:3000}
      - KANBAN_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - KANBAN_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - KANBAN_S3_BUCKET_NAME=files
      - ERP_API_BASE_URL=http://backend:8000/api/v1
      - ERP_SERVICE_TOKEN=${ERP_SERVICE_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================================
  # CELERY WORKER
  # =========================================================================

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant worker --loglevel=info --concurrency=2
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev-key-change-in-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-finans_assistant}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WORKLOG_S3_ENDPOINT_URL=http://minio:9000
      - WORKLOG_S3_PUBLIC_URL=http://localhost:9000
      - WORKLOG_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - WORKLOG_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - WORKLOG_S3_BUCKET_NAME=worklog-media
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - BANK_ENCRYPTION_KEY=${BANK_ENCRYPTION_KEY:-}
      - BREEZ_API_BASE_URL=${BREEZ_API_BASE_URL:-https://api.breez.ru/v1}
      - BREEZ_API_AUTH_HEADER=${BREEZ_API_AUTH_HEADER:-}
      - FNS_API_KEY=${FNS_API_KEY:-}
      # Portal S3 storage
      - PORTAL_S3_ENDPOINT_URL=http://minio:9000
      - PORTAL_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - PORTAL_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PORTAL_S3_BUCKET_NAME=portal-estimates
      - PORTAL_DOMAIN=${PORTAL_DOMAIN:-}
      # Email (SMTP)
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@example.com}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================================
  # CELERY BEAT (планировщик)
  # =========================================================================

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant beat --loglevel=info
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev-key-change-in-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-finans_assistant}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================================
  # CELERY PUBLIC WORKER (публичный портал смет — отдельная очередь)
  # =========================================================================

  celery-public-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant worker --loglevel=info --concurrency=2 -Q public_tasks
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev-key-change-in-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-finans_assistant}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WORKLOG_S3_ENDPOINT_URL=http://minio:9000
      - WORKLOG_S3_PUBLIC_URL=http://localhost:9000
      - WORKLOG_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - WORKLOG_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - WORKLOG_S3_BUCKET_NAME=worklog-media
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      # Portal S3 storage
      - PORTAL_S3_ENDPOINT_URL=http://minio:9000
      - PORTAL_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - PORTAL_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PORTAL_S3_BUCKET_NAME=portal-estimates
      - PORTAL_DOMAIN=${PORTAL_DOMAIN:-}
      # Email (SMTP)
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@example.com}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================================
  # TELEGRAM BOT
  # =========================================================================

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WEBHOOK_URL=${BOT_WEBHOOK_URL:-}
      - WEBHOOK_PATH=/bot/webhook
      - WEBAPP_HOST=0.0.0.0
      - WEBAPP_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-finans_assistant}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379/0
      - MINI_APP_URL=${MINI_APP_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================================
  # ERP FRONTEND (React + nginx)
  # =========================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # =========================================================================
  # TELEGRAM MINI APP (React + nginx)
  # =========================================================================

  mini-app:
    build:
      context: ./mini-app
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  # =========================================================================
  # PORTAL — Публичный портал расчёта смет (React + nginx)
  # =========================================================================

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

  # =========================================================================
  # HVAC-INFO — Новостной портал (отдельный Django + React)
  # =========================================================================

  createhvacdb:
    image: postgres:14-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: postgres
      HVAC_DB_NAME: ${HVAC_DB_NAME:-hvac_db}
    entrypoint: >
      /bin/sh -c "
      echo 'Ensuring hvac_db database exists...';
      psql -h $$DB_HOST -U $$DB_USER -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname='$$HVAC_DB_NAME'\" | grep -q 1
      || psql -h $$DB_HOST -U $$DB_USER -d postgres -c \"CREATE DATABASE \\\"$$HVAC_DB_NAME\\\"\" ;
      exit 0;
      "

  hvac-backend:
    build:
      context: ./hvac-info/backend
      dockerfile: Dockerfile
    command: ["gunicorn", "config.wsgi:application",
              "--bind", "0.0.0.0:8001", "--workers", "2", "--timeout", "120",
              "--access-logfile", "-", "--error-logfile", "-"]
    ports:
      - "8001:8001"
    environment:
      - DEBUG=${HVAC_DEBUG:-False}
      - HVAC_ENV=prod
      - SECRET_KEY=${HVAC_SECRET_KEY:-django-insecure-hvac-change-in-production}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${HVAC_DB_NAME:-hvac_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - ALLOWED_HOSTS=hvac-info.com,www.hvac-info.com,localhost,hvac-backend
      # AI провайдеры
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Email
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      # Captcha
      - HCAPTCHA_SECRET_KEY=${HCAPTCHA_SECRET_KEY:-}
      # Translation
      - TRANSLATION_API_KEY=${TRANSLATION_API_KEY:-}
    volumes:
      - hvac_media:/app/media
      - hvac_static:/app/staticfiles
    depends_on:
      createhvacdb:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:8001/api/hvac/references/manufacturers/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  hvac-frontend:
    build:
      context: ./hvac-info/frontend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      - hvac-backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_media:
  backend_logs:
  backend_static:
  hvac_media:
  hvac_static:
