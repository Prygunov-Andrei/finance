x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-backend-env: &backend-env
  APP_VERSION: ${APP_VERSION:-dev}
  DEBUG: ${DEBUG:-True}
  SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-dev-key-change-in-production}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: "${DB_PORT:-5432}"
  DB_NAME: ${DB_NAME:-finans_assistant}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  WORKLOG_S3_ENDPOINT_URL: http://minio:9000
  WORKLOG_S3_PUBLIC_URL: http://localhost:9000
  WORKLOG_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  WORKLOG_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  WORKLOG_S3_BUCKET_NAME: worklog-media
  KANBAN_S3_ENDPOINT_URL: http://minio:9000
  KANBAN_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  KANBAN_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  KANBAN_S3_BUCKET_NAME: files
  PORTAL_S3_ENDPOINT_URL: http://minio:9000
  PORTAL_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  PORTAL_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  PORTAL_S3_BUCKET_NAME: portal-estimates
  PORTAL_DOMAIN: ${PORTAL_DOMAIN:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
  GROK_API_KEY: ${GROK_API_KEY:-}
  BANK_ENCRYPTION_KEY: ${BANK_ENCRYPTION_KEY:-}
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
  JWT_ISSUER: ${JWT_ISSUER:-finans-assistant-erp}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-erp}
  BREEZ_API_BASE_URL: ${BREEZ_API_BASE_URL:-https://api.breez.ru/v1}
  BREEZ_API_AUTH_HEADER: ${BREEZ_API_AUTH_HEADER:-}
  FNS_API_KEY: ${FNS_API_KEY:-}
  ERP_SERVICE_TOKEN: ${ERP_SERVICE_TOKEN:-}
  PRODUCTION_DOMAIN: ${PRODUCTION_DOMAIN:-}
  PRODUCTION_IP: ${PRODUCTION_IP:-}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}
  RECOGNITION_URL: ${RECOGNITION_URL:-http://recognition:8003}
  RECOGNITION_API_KEY: ${RECOGNITION_API_KEY:-dev-recognition-key-change-me}

services:

  # =========================================================================
  # ИНФРАСТРУКТУРА
  # =========================================================================

  postgres:
    image: postgres:14-alpine
    profiles:
      - local-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-finans_assistant}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/worklog-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/worklog-media;
      /usr/bin/mc mb myminio/files --ignore-existing;
      /usr/bin/mc mb myminio/product-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/product-media;
      /usr/bin/mc mb myminio/portal-estimates --ignore-existing;
      /usr/bin/mc mb myminio/hvac-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/hvac-media;
      exit 0;
      "
    logging: *default-logging

  # =========================================================================
  # BACKEND (Django + Gunicorn)
  # =========================================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Gunicorn: 2 workers оптимально для 1 CPU VPS (формула: 2*CPU+1, но ограничено RAM)
    command: ["gunicorn", "finans_assistant.wsgi:application",
              "--bind", "0.0.0.0:8000", "--workers", "2", "--timeout", "120",
              "--reload",
              "--access-logfile", "-", "--error-logfile", "-"]
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_logs:/app/logs
      - backend_static:/app/staticfiles
      - ./.git:/app/.git:ro
    depends_on:
      redis:
        condition: service_healthy
      recognition:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  celery-worker:
    profiles:
      - full-stack
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant worker --loglevel=info --concurrency=2 -Q celery,translations
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped

  celery-beat:
    profiles:
      - full-stack
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped

  celery-public-worker:
    profiles:
      - full-stack
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant worker --loglevel=info --concurrency=2 -Q public_tasks
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped

  # =========================================================================
  # TELEGRAM BOT
  # =========================================================================

  bot:
    profiles:
      - full-stack
    build:
      context: ./bot
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      WEBHOOK_URL: ${BOT_WEBHOOK_URL:-}
      WEBHOOK_PATH: /bot/webhook
      WEBAPP_HOST: 0.0.0.0
      WEBAPP_PORT: "8081"
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: ${DB_NAME:-finans_assistant}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      MINI_APP_URL: ${MINI_APP_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 8081)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    restart: unless-stopped

  # =========================================================================
  # ERP FRONTEND (Next.js)
  # =========================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_API_URL: http://backend:8000
      MINIO_URL: http://minio:9000
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped

  # =========================================================================
  # TELEGRAM MINI APP
  # =========================================================================

  mini-app:
    build:
      context: ./mini-app
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  # =========================================================================
  # RECOGNITION SERVICE (PDF → items via LLM Vision, ADR-0023)
  # =========================================================================

  recognition:
    build:
      context: ./recognition
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      RECOGNITION_API_KEY: ${RECOGNITION_API_KEY:-dev-recognition-key-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${RECOGNITION_LOG_LEVEL:-INFO}
      MAX_FILE_SIZE_MB: ${RECOGNITION_MAX_FILE_SIZE_MB:-50}
      PARSE_TIMEOUT_SECONDS: ${RECOGNITION_PARSE_TIMEOUT_SECONDS:-300}
      LLM_MODEL: ${RECOGNITION_LLM_MODEL:-gpt-4o-mini}
      # E15.05 it2 — гибрид: extract на gpt-4o full, classify mini,
      # conditional multimodal retry при confidence < 0.7.
      LLM_EXTRACT_MODEL: ${RECOGNITION_LLM_EXTRACT_MODEL:-gpt-4o}
      LLM_CLASSIFY_MODEL: ${RECOGNITION_LLM_CLASSIFY_MODEL:-gpt-4o-mini}
      LLM_MULTIMODAL_MODEL: ${RECOGNITION_LLM_MULTIMODAL_MODEL:-gpt-4o}
      LLM_MULTIMODAL_RETRY_ENABLED: ${RECOGNITION_LLM_MULTIMODAL_RETRY_ENABLED:-true}
      LLM_MULTIMODAL_RETRY_THRESHOLD: ${RECOGNITION_LLM_MULTIMODAL_RETRY_THRESHOLD:-0.7}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_media:
  backend_logs:
  backend_static:
