# Единый nginx конфиг для hvac-info.com
# Устанавливается в /etc/nginx/sites-available/hvac-info.conf
# Символическая ссылка: ln -s /etc/nginx/sites-available/hvac-info.conf /etc/nginx/sites-enabled/

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name hvac-info.com www.hvac-info.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hvac-info.com www.hvac-info.com;

    # SSL — certbot обновит эти пути автоматически
    ssl_certificate /etc/letsencrypt/live/hvac-info.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hvac-info.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Общие настройки
    client_max_body_size 200M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    # =========================================================
    # HVAC-INFO — основной сайт (новости, статьи) — корень /
    # =========================================================
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API hvac-info
    location /api/hvac/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin hvac-info
    location /hvac-admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика и медиа hvac-info
    location /hvac-static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    location /hvac-media/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # =========================================================
    # ПОРТАЛ СМЕТ — /smeta/
    # =========================================================
    location /smeta/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Referrer-Policy "no-referrer" always;
    }

    # Public API (портал смет, без авторизации)
    location /api/public/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 200M;
        proxy_read_timeout 300s;
    }

    # =========================================================
    # ERP — /erp/ (по логину-паролю через JWT)
    # =========================================================
    location /erp/ {
        proxy_pass http://127.0.0.1:3000/erp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ERP API (JWT-аутентификация)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 120s;
    }

    # Kanban API (объединён с основным бэкендом)
    location /kanban-api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin ERP
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ERP static files (Django admin CSS/JS)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ERP media файлы
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # MinIO S3 proxy — файлы Kanban
    location /files/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host localhost:9000;
        proxy_http_version 1.1;
        client_max_body_size 100M;
    }

    # =========================================================
    # TELEGRAM
    # =========================================================
    location /bot/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /mini-app/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================================================
    # MinIO Console (только для администратора)
    # =========================================================
    location /minio-console/ {
        proxy_pass http://127.0.0.1:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================================================
    # SECURITY HEADERS
    # =========================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
