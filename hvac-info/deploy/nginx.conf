# =============================================
# hvac-news.online
# =============================================
server {
    listen 80;
    server_name hvac-news.online www.hvac-news.online;

    # Frontend SPA (React/NextJs build)
    location / {
        root /var/www/hvac-news/frontend/build;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /var/www/hvac-news/backend/staticfiles/;
    }

    # Media files
    location /media/ {
        alias /var/www/hvac-news/backend/media/;
    }
}

# =============================================
# hvac-info.com — с порталом расчёта смет
# =============================================
server {
    listen 80;
    server_name hvac-info.com www.hvac-info.com;

    # Frontend SPA (React/NextJs build)
    location / {
        root /var/www/hvac-news/frontend/build;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /var/www/hvac-news/backend/staticfiles/;
    }

    # Media files
    location /media/ {
        alias /var/www/hvac-news/backend/media/;
    }

    # =============================================
    # Портал расчёта смет — React SPA
    # =============================================
    location /smeta/ {
        proxy_pass http://72.56.111.111:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security: access_token в URL не должен утекать через Referer
        add_header Referrer-Policy "no-referrer" always;
    }

    # =============================================
    # API для портала смет — проксируем на backend
    # =============================================
    location /api/public/ {
        proxy_pass http://72.56.111.111:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Лимит на загрузку файлов (макс 200 МБ на запрос)
        client_max_body_size 200M;

        # Таймаут — обработка файлов может занять до 5 мин
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
