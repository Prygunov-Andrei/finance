x-backend-env: &backend-env
  APP_VERSION: ${APP_VERSION:-dev}
  DEBUG: ${DEBUG:-False}
  SECRET_KEY: ${SECRET_KEY}
  BANK_ENCRYPTION_KEY: ${BANK_ENCRYPTION_KEY:-}
  TOCHKA_USERNAME: ${TOCHKA_USERNAME:-}
  TOCHKA_PASSWORD: ${TOCHKA_PASSWORD:-}
  TOCHKA_JWT_TOKEN: ${TOCHKA_JWT_TOKEN:-}
  PRODUCTION_DOMAIN: ${PRODUCTION_DOMAIN:-}
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  WORKLOG_S3_ENDPOINT_URL: http://minio:9000
  WORKLOG_S3_PUBLIC_URL: ${PUBLIC_BACKEND_URL:-}/media
  WORKLOG_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  WORKLOG_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  WORKLOG_S3_BUCKET_NAME: worklog-media
  KANBAN_S3_ENDPOINT_URL: http://minio:9000
  KANBAN_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  KANBAN_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  KANBAN_S3_BUCKET_NAME: files
  PORTAL_S3_ENDPOINT_URL: http://minio:9000
  PORTAL_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  PORTAL_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  PORTAL_S3_BUCKET_NAME: portal-estimates
  PORTAL_DOMAIN: ${PORTAL_DOMAIN:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
  FNS_API_KEY: ${FNS_API_KEY:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
  ERP_SERVICE_TOKEN: ${ERP_SERVICE_TOKEN:-}
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
  JWT_ISSUER: ${JWT_ISSUER:-finans-assistant-erp}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-erp}
  BITRIX_WEBHOOK_TIMEOUT: ${BITRIX_WEBHOOK_TIMEOUT:-30}
  BITRIX_WEBHOOK_ENABLED: ${BITRIX_WEBHOOK_ENABLED:-true}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
  GROK_API_KEY: ${GROK_API_KEY:-}
  BREEZ_API_BASE_URL: ${BREEZ_API_BASE_URL:-https://api.breez.ru/v1}
  BREEZ_API_AUTH_HEADER: ${BREEZ_API_AUTH_HEADER:-}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}

services:

  # =========================================================================
  # ИНФРАСТРУКТУРА
  # =========================================================================

  postgres:
    image: postgres:14-alpine
    # PRODUCTION: доступ к PostgreSQL только через loopback сервера и SSH-туннель
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_MAX_CONNECTIONS: 100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    # PRODUCTION: Убран проброс портов наружу
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    # PRODUCTION: Порт проброшен на localhost для доступа через nginx
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "test -d /data"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/worklog-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/worklog-media;
      /usr/bin/mc mb myminio/files --ignore-existing;
      /usr/bin/mc mb myminio/product-media --ignore-existing;
      /usr/bin/mc anonymous set download myminio/product-media;
      /usr/bin/mc mb myminio/portal-estimates --ignore-existing;
      exit 0;
      "

  # =========================================================================
  # BACKEND (Django + Gunicorn)
  # =========================================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      <<: *backend-env
    volumes:
      - backend_media:/app/media
      - backend_logs:/app/logs
      - backend_static:/app/staticfiles
      # .git смонтирован read-only для generate_changelog (чтение git log между тегами)
      - ./.git:/app/.git:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request, urllib.error; url='http://localhost:8000/api/v1/';\ntry:\n urllib.request.urlopen(url); sys.exit(0)\nexcept urllib.error.HTTPError as e:\n sys.exit(0 if e.code in (200,401,403) else 1)\nexcept Exception:\n sys.exit(1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # CELERY WORKER
  # =========================================================================

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant worker --loglevel=info --concurrency=2
    environment:
      <<: *backend-env
    volumes:
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # CELERY PUBLIC WORKER (задачи портала смет)
  # =========================================================================

  celery-public-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant worker --loglevel=info --concurrency=2 -Q public_tasks
    environment:
      <<: *backend-env
    volumes:
      - backend_media:/app/media
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # CELERY BEAT (планировщик)
  # =========================================================================

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A finans_assistant beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # TELEGRAM BOT
  # =========================================================================

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    command: ["python", "main.py", "--webhook"]
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WEBHOOK_URL=${BOT_WEBHOOK_URL}
      - WEBHOOK_PATH=/bot/webhook
      - WEBAPP_HOST=0.0.0.0
      - WEBAPP_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - MINI_APP_URL=${MINI_APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # ERP FRONTEND (Next.js)
  # =========================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - BACKEND_API_URL=http://backend:8000
      - NEXT_PUBLIC_APP_VERSION=${APP_VERSION:-dev}
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # TELEGRAM MINI APP (React + nginx)
  # =========================================================================

  mini-app:
    build:
      context: ./mini-app
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # HVAC-INFO — Новостной портал климатической индустрии
  # =========================================================================

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_media:
  backend_logs:
  backend_static:
