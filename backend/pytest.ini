[pytest]
DJANGO_SETTINGS_MODULE = finans_assistant.settings
python_files = test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths =
    core
    payments
    supply
    banking
    catalog
    worklog
    api_public
    estimates
    accounting
    contracts
    kanban_core
    kanban_commercial
    llm_services
    objects
    personnel
    pricelists
    supplier_integrations
    communications
    fns
    finans_assistant
    ac_brands
    ac_methodology
    ac_catalog
    ac_scoring
    ac_reviews
    ac_submissions
addopts =
    --strict-markers
    --tb=short
    -q
    --cov=worklog
    --cov=supply
    --cov=payments
    --cov=core
    --cov=banking
    --cov=api_public
    --cov=estimates
    --cov=accounting
    --cov=contracts
    --cov=kanban_core
    --cov=kanban_commercial
    --cov=llm_services
    --cov=objects
    --cov=personnel
    --cov=pricelists
    --cov=supplier_integrations
    --cov=communications
    --cov=fns
    --cov=finans_assistant
    --cov=hvac_bridge
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=.coveragerc
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
