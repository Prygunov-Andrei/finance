server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # SPA — все маршруты ведут на index.html (base path /erp/)
    location /erp/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /erp/index.html;
    }

    # Редирект / → /erp/
    location = / {
        return 301 /erp/;
    }

    # Проксирование API запросов к Django backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Проксирование Kanban API запросов к Kanban-сервису
    # resolver нужен для мягкого резолвинга — nginx не падает если kanban-api не запущен
    location /kanban-api/ {
        resolver 127.0.0.11 valid=30s;
        set $kanban_upstream http://kanban-api:8010;
        proxy_pass $kanban_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # MinIO S3 proxy — загрузка/скачивание файлов Kanban
    location /files/ {
        resolver 127.0.0.11 valid=30s;
        set $minio_upstream http://minio:9000;
        proxy_pass $minio_upstream;
        proxy_set_header Host minio:9000;
        proxy_http_version 1.1;
        client_max_body_size 100M;
    }

    # Django Admin (если нужен доступ через frontend порт)
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django static files (для Admin CSS/JS)
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Media файлы
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
