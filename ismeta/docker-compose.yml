# ISMeta — dev оркестрация (E1.1).
# ADR-0018: docker-compose как prod-подобная среда MVP.
# Поднимает 4 сервиса: postgres (host 5433), redis (6380), backend (8001),
# frontend (3001). Нестандартные host-порты — чтобы работать параллельно
# с ERP-стеком, который занимает 5432/6379/8000/3000. Внутри контейнеров
# стандартные порты.
# Миграции НЕ запускаются (apps ещё не созданы — E1.2).

name: ismeta

services:
  postgres:
    image: postgres:14-alpine
    container_name: ismeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ismeta}
      POSTGRES_USER: ${POSTGRES_USER:-ismeta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ismeta}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ismeta} -d ${POSTGRES_DB:-ismeta}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ismeta-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ismeta-backend:
    build:
      context: ./backend
      target: development
    container_name: ismeta-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      recognition:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
      DEBUG: ${DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,ismeta-backend}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ismeta}
      DB_USER: ${POSTGRES_USER:-ismeta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ismeta}
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      REDIS_URL: redis://redis:6379/2
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      RECOGNITION_URL: ${RECOGNITION_URL:-http://recognition:8003}
      RECOGNITION_API_KEY: ${RECOGNITION_API_KEY:-dev-recognition-key}
      # E18-2: Fernet-ключ для шифрования LLMProfile.api_key (см. .env.example).
      LLM_PROFILE_ENCRYPTION_KEY: ${LLM_PROFILE_ENCRYPTION_KEY:-}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      # Bind mount исходников для hot reload через runserver.
      - ./backend:/app
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  # E19-2: sidecar воркер RecognitionJob — пулит queued jobs через Postgres
  # SELECT FOR UPDATE SKIP LOCKED, POST'ит на recognition с callback URL.
  # Тот же образ что ismeta-backend, общий код apps/. После добавления job'а
  # POST'ом в /import/pdf/?async=true backend ничего сам не дёргает —
  # воркер забирает из таблицы и dispatch'ит. Recognition потом шлёт
  # callbacks обратно в ismeta-backend на /api/v1/recognition-jobs/{id}/callback/.
  recognition-worker:
    build:
      context: ./backend
      target: development
    container_name: ismeta-recognition-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      recognition:
        condition: service_healthy
      ismeta-backend:
        condition: service_started
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
      DEBUG: ${DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,ismeta-backend}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ismeta}
      DB_USER: ${POSTGRES_USER:-ismeta}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ismeta}
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      REDIS_URL: redis://redis:6379/2
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      RECOGNITION_URL: ${RECOGNITION_URL:-http://recognition:8003}
      RECOGNITION_API_KEY: ${RECOGNITION_API_KEY:-dev-recognition-key}
      # E18-2: Fernet-ключ для шифрования LLMProfile.api_key (см. .env.example).
      LLM_PROFILE_ENCRYPTION_KEY: ${LLM_PROFILE_ENCRYPTION_KEY:-}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://ismeta-backend:8000}
      RECOGNITION_MAX_PARALLEL_JOBS: ${RECOGNITION_MAX_PARALLEL_JOBS:-2}
      RECOGNITION_WORKER_POLL_INTERVAL: ${RECOGNITION_WORKER_POLL_INTERVAL:-2.0}
    volumes:
      - ./backend:/app
    command: ["python", "manage.py", "recognition_worker"]
    # E19-2: воркер не запускает HTTP-сервер, только poll loop. Healthcheck
    # из Dockerfile (curl :8000) фейлится → status=unhealthy. Отключаем.
    healthcheck:
      disable: true

  ismeta-frontend:
    build:
      context: ./frontend
      target: development
    container_name: ismeta-frontend
    restart: unless-stopped
    depends_on:
      - ismeta-backend
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_ISMETA_API_URL: ${NEXT_PUBLIC_ISMETA_API_URL:-http://localhost:8001/api/v1}
      NEXT_PUBLIC_DEFAULT_WORKSPACE: ${NEXT_PUBLIC_DEFAULT_WORKSPACE:-11111111-1111-1111-1111-111111111111}
      NEXT_PUBLIC_FEATURE_AGENT: ${NEXT_PUBLIC_FEATURE_AGENT:-true}
      NEXT_PUBLIC_FEATURE_EXCEL_ROUNDTRIP: ${NEXT_PUBLIC_FEATURE_EXCEL_ROUNDTRIP:-true}
      NEXT_PUBLIC_FEATURE_PUBLIC_MODE: ${NEXT_PUBLIC_FEATURE_PUBLIC_MODE:-false}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    volumes:
      # Bind mount исходников; node_modules остаётся в образе.
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  recognition:
    build:
      context: ../recognition
    container_name: ismeta-recognition
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RECOGNITION_API_KEY: ${RECOGNITION_API_KEY:-dev-recognition-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # TD-04: LLM_API_KEY — основной env var (OpenAI/DeepSeek/Claude
      # OpenAI-compatible). OPENAI_API_KEY оставлен как deprecated alias
      # для backward compat (см. recognition/app/config.py::_resolve_api_key).
      LLM_API_KEY: ${LLM_API_KEY:-${OPENAI_API_KEY:-}}
      # LLM модели и base_url берутся из .env (env_file). Default = gpt-5.4
      # для OpenAI; для DeepSeek/других OpenAI-совместимых endpoint'ов
      # установить в .env: OPENAI_API_BASE=https://api.deepseek.com,
      # LLM_EXTRACT_MODEL=deepseek-chat и т.д.
    ports:
      - "${RECOGNITION_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
