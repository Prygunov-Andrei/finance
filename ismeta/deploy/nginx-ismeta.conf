# ISMeta nginx reverse proxy.
# Установить в /etc/nginx/sites-available/ismeta.conf
# ln -s /etc/nginx/sites-available/ismeta.conf /etc/nginx/sites-enabled/
#
# Заменить ismeta.hvac-info.com на реальный домен перед установкой.
# Если без домена — использовать IP:3002 напрямую (этот конфиг не нужен).

server {
    listen 80;
    server_name ismeta.hvac-info.com;

    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        proxy_pass http://127.0.0.1:8002;
    }

    # Webhooks (from ERP)
    location /api/v1/webhooks/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
